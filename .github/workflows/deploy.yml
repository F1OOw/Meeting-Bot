name: Deploy (VPS)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy via SSH (git pull + docker compose restart)
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          set -euo pipefail

          : "${VPS_HOST:?Missing secret VPS_HOST}"
          : "${VPS_USER:?Missing secret VPS_USER}"
          : "${VPS_PATH:?Missing secret VPS_PATH}"

          port="${VPS_PORT:-22}"

          remote_path_quoted="$(printf '%q' "${VPS_PATH}")"
          ssh \
            -p "${port}" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${VPS_USER}@${VPS_HOST}" "VPS_PATH=${remote_path_quoted} bash -se" <<'REMOTE'
          set -euo pipefail

          : "${VPS_PATH:?VPS_PATH not set on remote command}"
          cd "${VPS_PATH}"

          git fetch --prune origin
          git checkout main
          git reset --hard origin/main

          if docker compose version >/dev/null 2>&1; then
            compose=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            compose=(docker-compose)
          else
            echo "Neither 'docker compose' nor 'docker-compose' found on server." >&2
            exit 1
          fi

          "${compose[@]}" down
          "${compose[@]}" up -d --build
          REMOTE
